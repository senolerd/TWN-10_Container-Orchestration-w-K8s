{{- if eq .Values.infra "AWS" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ .Values.app.name }}"
  namespace: "{{ .Values.namespace }}"
spec:
  parentRefs: 
    - name: "{{ .Values.httpRouteParentRef }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: "{{ .Values.app.name }}" 
          port: {{ .Values.appServicePort }}
{{- end}} 