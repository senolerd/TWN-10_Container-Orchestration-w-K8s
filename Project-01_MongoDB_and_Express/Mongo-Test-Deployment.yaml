apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-config
data:
  ME_CONFIG_BASICAUTH_ENABLED: "true"
  mongodb_root_username: "root"
  mongo_express_username: "mongoexpressuser"
  mongodb_port: "27017"
  mondodb_url: ""
  mongodb_server: "127.0.0.1"
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secrets
type: Opaque
data:
  mongodb_root_pw: "ZXhhbXBsZQ=="
  mongo_express_pw: "bW9uZ29leHByZXNzcGFzcw=="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      db: mongo
  template:
    metadata:
      labels:
        db: mongo
    spec:
      containers:
        - name: mongo-db
          image: docker.io/mongo:noble
          ports:
            - containerPort: 27017
          env:
            - name: "MONGO_INITDB_ROOT_USERNAME"
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: "mongodb_root_username"
            - name: "MONGO_INITDB_ROOT_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: "mongodb_root_pw"
        - name: "mongo-express"
          image: "mongo-express:1.0.2-20-alpine3.19"
          ports:
            - containerPort: 8081
          env:
            - name: "ME_CONFIG_BASICAUTH_USERNAME"
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongo_express_username
            - name: "ME_CONFIG_BASICAUTH_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: mongo_express_pw
            - name: "ME_CONFIG_MONGODB_PORT"
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongodb_port
            - name: "ME_CONFIG_MONGODB_SERVER"
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongodb_server
            - name: "ME_CONFIG_MONGODB_URL"
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mondodb_url
            - name: "ME_CONFIG_MONGODB_ADMINUSERNAME"
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongodb_root_username
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: mongodb_root_pw
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector:
    db: mongo
  ports:
    - protocol: TCP
      port: 48081
      targetPort: 8081
---
