apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongoexpress-depl
  labels:
    app: mongoexpress-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: "mongo-express"
          image: "mongo-express:1.0.2-20-alpine3.19"
          ports:
            - containerPort: 8081
          env:
            - name: "ME_CONFIG_BASICAUTH_USERNAME"
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: MONGO_EXPRESS_USER
            - name: "ME_CONFIG_BASICAUTH_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: MONGO_EXPRESS_PW
            - name: "ME_CONFIG_MONGODB_PORT"
              valueFrom:
                configMapKeyRef:
                  name: mongo-configs
                  key: MONGODB_PORT
            - name: "ME_CONFIG_MONGODB_SERVER"
              valueFrom:
                configMapKeyRef:
                  name: mongo-configs
                  key: MONGODB_SERVER
            - name: "ME_CONFIG_MONGODB_URL"
              valueFrom:
                configMapKeyRef:
                  name: mongo-configs
                  key: MONGODB_URL
            - name: "ME_CONFIG_MONGODB_ADMINUSERNAME"
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express-svc
spec:
  type: NodePort
  selector:
    app: mongo-express
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30081

---
