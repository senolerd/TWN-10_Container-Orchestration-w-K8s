---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-configs
data:
  ME_CONFIG_BASICAUTH_ENABLED: "true"
  MONGODB_PORT: "27017"
  MONGODB_URL: ""
  MONGODB_SERVER: "mongo-sts-0.mongodb-headless.default.svc.cluster.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secrets
type: Opaque
data:
  MONGO_INITDB_ROOT_USERNAME: cm9vdA== #root
  MONGO_INITDB_ROOT_PASSWORD: cGFzc3dvcmQ= #password
  MONGO_EXPRESS_USER: "ZXhwcmVzc3VzZXI=" #expressuser
  MONGO_EXPRESS_PW: "ZXhwcmVzc3B3" #expresspw
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-rs-auth-keyfile
type: Opaque
# data:
#   auth-key: ideally <openssl rand -base64 756> outoput comes here
stringData:
  auth-key: "aLongStringForReplicaSetInternalAuthenticatioKeyFile"