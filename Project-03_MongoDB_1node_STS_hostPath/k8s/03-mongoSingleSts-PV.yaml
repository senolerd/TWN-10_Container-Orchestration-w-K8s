---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: hostpath-pv-1
  namespace: mongo-sts-test
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual-hostpath
  hostPath:
    path: /mnt/data
    type: "DirectoryOrCreate"
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k8s-worker-2-192-168-1-242 # Replace with exact k8s node name at "kubectl get nodes" NAME column
